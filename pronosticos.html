<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pronósticos · Penca Mundial 2026</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <span class="nav-logo">⚽</span>
    <span class="nav-title">Penca Mundial <strong>2026</strong></span>
  </div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Inicio</a>
    <a href="pronosticos.html" class="nav-link active">Pronósticos</a>
    <a href="clasificacion.html" class="nav-link">Clasificación</a>
    <a href="estadisticas.html" class="nav-link">Estadísticas</a>
  </div>
  <div class="nav-auth" id="nav-auth">
    <button class="btn-outline" onclick="openModal('modal-login')">Iniciar sesión</button>
  </div>
  <div class="nav-user hidden" id="nav-user">
    <span id="nav-nombre"></span>
    <button class="btn-outline" onclick="logout()">Salir</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Mis Pronósticos</h1>
    <p>Ingresá tu pronóstico antes de que comience cada partido.</p>
  </div>

  <!-- Login requerido -->
  <div id="login-required" class="alert-info hidden">
    <strong>Iniciá sesión</strong> para ingresar tus pronósticos.
    <button class="btn-primary" onclick="openModal('modal-login')">Iniciar sesión</button>
  </div>

  <!-- Filtros -->
  <div class="filtros" id="filtros-section">
    <select id="filtro-grupo" onchange="filtrarPartidos()">
      <option value="">Todos los grupos</option>
      <option value="A">Grupo A</option><option value="B">Grupo B</option>
      <option value="C">Grupo C</option><option value="D">Grupo D</option>
      <option value="E">Grupo E</option><option value="F">Grupo F</option>
      <option value="G">Grupo G</option><option value="H">Grupo H</option>
      <option value="I">Grupo I</option><option value="J">Grupo J</option>
      <option value="K">Grupo K</option><option value="L">Grupo L</option>
      <option value="M">Grupo M</option><option value="N">Grupo N</option>
      <option value="O">Grupo O</option><option value="P">Grupo P</option>
    </select>
    <div class="filtro-tabs">
      <button class="tab active" onclick="setTab('pendientes', this)">Sin pronosticar</button>
      <button class="tab" onclick="setTab('todos', this)">Todos los partidos</button>
      <button class="tab" onclick="setTab('mis', this)">Mis pronósticos</button>
    </div>
  </div>

  <div id="partidos-container">
    <div class="loading">Cargando partidos…</div>
  </div>
</main>

<!-- MODAL LOGIN -->
<div class="modal-overlay hidden" id="modal-login">
  <div class="modal">
    <div class="modal-header">
      <h3>Iniciar sesión</h3>
      <button class="modal-close" onclick="closeModal('modal-login')">✕</button>
    </div>
    <div class="modal-body">
      <div id="login-error" class="alert-error hidden"></div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="login-email" placeholder="tu@email.com">
      </div>
      <div class="form-group">
        <label>Contraseña</label>
        <input type="password" id="login-password" placeholder="••••••">
      </div>
      <button class="btn-primary btn-block" onclick="login()">Entrar</button>
    </div>
  </div>
</div>

<footer class="footer">
  <p>Penca Mundial 2026 · Proyecto Académico</p>
</footer>

<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/pronosticos.js"></script>
</body>
</html>
