<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clasificación · Penca Mundial 2026</title>
  <link rel="stylesheet" href="css/estilos.css">
</head>
<body>
<nav class="navbar">
  <div class="nav-brand"><span class="nav-logo">⚽</span><span class="nav-title">Penca Mundial <strong>2026</strong></span></div>
  <div class="nav-links">
    <a href="index.html" class="nav-link">Inicio</a>
    <a href="pronosticos.html" class="nav-link">Pronósticos</a>
    <a href="clasificacion.html" class="nav-link active">Clasificación</a>
    <a href="estadisticas.html" class="nav-link">Estadísticas</a>
  </div>
  <div class="nav-auth" id="nav-auth">
    <button class="btn-outline" onclick="openModal('modal-login')">Iniciar sesión</button>
  </div>
  <div class="nav-user hidden" id="nav-user">
    <span id="nav-nombre"></span>
    <button class="btn-outline" onclick="logout()">Salir</button>
  </div>
</nav>

<main>
  <div class="page-header">
    <h1>Clasificación</h1>
    <p>Ranking actualizado. Se recalcula automáticamente al ingresar resultados.</p>
    <span class="update-badge" id="ultimo-update"></span>
  </div>

  <div class="ranking-podio" id="podio"></div>

  <div class="tabla-container">
    <div class="tabla-toolbar">
      <input type="text" id="buscar-participante" placeholder="Buscar participante…" oninput="filtrarRanking()">
      <span class="tabla-info" id="tabla-info"></span>
    </div>
    <table class="tabla-ranking" id="ranking-table">
      <thead>
        <tr>
          <th class="col-pos">Pos</th>
          <th class="col-nombre">Participante</th>
          <th class="col-pts" title="Puntos totales">Pts</th>
          <th class="col-stat" title="Pronósticos exactos (3 pts)">Exactos</th>
          <th class="col-stat" title="Diferencia correcta (2 pts)">Dif.</th>
          <th class="col-stat" title="Ganador correcto (1 pt)">Ganad.</th>
          <th class="col-stat" title="Partidos jugados">PJ</th>
          <th class="col-pct">% Acierto</th>
        </tr>
      </thead>
      <tbody id="ranking-body">
        <tr><td colspan="8" class="loading">Cargando clasificación…</td></tr>
      </tbody>
    </table>
  </div>
</main>

<div class="modal-overlay hidden" id="modal-login">
  <div class="modal">
    <div class="modal-header"><h3>Iniciar sesión</h3><button class="modal-close" onclick="closeModal('modal-login')">✕</button></div>
    <div class="modal-body">
      <div id="login-error" class="alert-error hidden"></div>
      <div class="form-group"><label>Email</label><input type="email" id="login-email" placeholder="tu@email.com"></div>
      <div class="form-group"><label>Contraseña</label><input type="password" id="login-password" placeholder="••••••"></div>
      <button class="btn-primary btn-block" onclick="login()">Entrar</button>
    </div>
  </div>
</div>

<footer class="footer"><p>Penca Mundial 2026 · Proyecto Académico</p></footer>
<script src="js/api.js"></script>
<script src="js/app.js"></script>
<script src="js/ranking.js"></script>
</body>
</html>
